name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    # Deny rustc warnings for workspace crates (deps are cap-lints allowed).
    env:
      RUSTFLAGS: -D warnings
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt (workspace + fuzz)
        run: |
          cargo fmt --all -- --check
          (cd fuzz && cargo fmt -- --check)
      - name: clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: clippy (bench + fuzz surface)
        run: cargo clippy -p ntui --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: build examples
        run: cargo build -p ntui --examples

  fuzz:
    name: fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [wrap_text, truncate_line, render_text]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: clippy (fuzz crate)
        run: cargo clippy --manifest-path fuzz/Cargo.toml --all-targets -- -D warnings
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: fuzz smoke (${{ matrix.target }}, 60s)
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=60
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
